{% extends 'share_layout.html' %} 
{% block title %}Home{% endblock %} 

{% block search %}
<div class="container mt-3">
  <input type="text" class="form-control" placeholder="Search tours...">

  <select class="form-select" aria-label="Default select example">
    <option selected>Loại tour...</option>
    {% for category in categories %}
    <option value="{{category.id}}">{{category.name}}</option>
    {% endfor %}
  </select>

  <select class="form-select" aria-label="Default select example">
      <option selected>Quốc gia...</option>
      {% for country in countries %}
      <option value="{{country.id}}">{{country.name}}</option>
      {% endfor %}
  </select>

  <select class="form-select" aria-label="Default select example">
      <option selected>Châu lục...</option>
      {% for continent in continents %}
      <option value="{{continent.id}}">{{continent.name}}</option>
      {% endfor %}
  </select>
</div>
{% endblock %}

{% block content %}
<div class="container mt-5">
  <h1 class="mb-4">Available Tours</h1>
  <div class="row">
    {% for tour in tours %}
    <div class="col-md-4 mb-4">
      <div class="card h-100">
        <img
          src="{{ tour.thumbnail.url }}"
          class="card-img-top"
          alt="{{ tour.title }}"
        />
        <div class="card-body">
          <h5 class="card-title">{{ tour.title }}</h5>
          <p class="card-text">{{ tour.description|truncatewords:20 }}</p>
          <a href="{% url 'tour_detail' tour.id %}" class="btn btn-primary"
            >View Details</a
          >
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock content %}
